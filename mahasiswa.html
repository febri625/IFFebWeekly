<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mahasiswa | WEB INFORMATIKA 2026</title>

    <style>
        .container {
        display: grid;
        grid-template-columns: repeat(4, 90px);
        grid-template-rows: 50px 90px 90px 50px;
        gap: 3px;
        margin-top: 30px;
    }

        .box {
            border: 1px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
        }

        .center {
            grid-column: 2 / 4;
            grid-row: 2 / 4;
            font-size: 30px;
            font-weight: bold;
        }

        .kiri1 { grid-column: 1; grid-row: 2; }
        .kiri2 { grid-column: 1; grid-row: 3; }

        .kanan1 { grid-column: 4; grid-row: 2; }
        .kanan2 { grid-column: 4; grid-row: 3; }
    </style>
</head>
<body>

    <h1>WEB INFORMATIKA FEBRI 2026</h1>
    <hr />

    <!-- MENU -->
    <table border="1" cellspacing="0" cellpadding="10">
      <tr>
        <td><a href="index.html">Home </a></td>
        <td><a href="profile.html">Profil</a></td>
        <td><a href="contact.html">Contact </a></td>
        <td><a href="mahasiswa.html">Data Mahasiswa </a></td>
      </tr>
    </table>

    <h3>Data Mahasiswa</h3>

    <!-- TABEL NILAI -->
    <table border="1" cellpadding="10">
      <tr>
        <th rowspan="2">Nama</th>
        <th colspan="3" align="center">Nilai</th>
      </tr>
      <tr>
        <th>UTS</th>
        <th>UAS</th>
        <th>TUGAS</th>
      </tr>

      <tr>
        <td>Alie</td>
        <td>85</td>
        <td>90</td>
        <td>88</td>
      </tr>
      <tr>
        <td>Cinta</td>
        <td>80</td>
        <td>85</td>
        <td>87</td>
      </tr>
      <tr>
        <td>Febri</td>
        <td>78</td>
        <td>82</td>
        <td>80</td>
      </tr>
    </table>

    <!-- LAYOUT GRID -->
    <h3>Layout Grid</h3>

    <div class="container">

        <!-- ATAS -->
        <div class="box">1,1</div>
        <div class="box">1,2</div>
        <div class="box">1,3</div>
        <div class="box">1,4</div>

        <!-- KIRI -->
        <div class="box kiri1">2,1</div>
        <div class="box kiri2">3,1</div>

        <!-- TENGAH -->
        <div class="box center">?</div>

        <!-- KANAN -->
        <div class="box kanan1">2,4</div>
        <div class="box kanan2">3,4</div>

        <!-- BAWAH -->
        <div class="box">4,1</div>
        <div class="box">4,2</div>
        <div class="box">4,3</div>
        <div class="box">4,4</div>

    </div>

</body>
</html>
